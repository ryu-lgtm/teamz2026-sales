<style>
  :root {

    --dark: #111;
    --card: #1e1e1e;
    --card2: #252525;
    --text: #f0f0f0;
    --muted: #777;
    --border: #333;
    --red: #ff4444;
    --yellow: #ffaa00;
    --green: #44bb44;
    --blue: #4499ff;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; min-height: 100vh; }

  header { background: #0a0a0a; padding: 14px 20px; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  header h1 { color: var(--accent); font-size: 16px; font-weight: 700; }
  header .meta { font-size: 11px; color: var(--muted); }

  .tabs { display: flex; background: #0d0d0d; border-bottom: 1px solid var(--border); padding: 0 20px; position: sticky; top: 53px; z-index: 99; }
  .tab { padding: 12px 20px; cursor: pointer; color: var(--muted); font-size: 14px; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .filters { padding: 12px 20px; background: #0d0d0d; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); }
  .filter-btn { padding: 5px 14px; border: 1px solid #444; border-radius: 20px; background: none; color: var(--muted); cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,201,167,0.08); }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .legend { padding: 8px 20px; background: #0a0a0a; display: flex; gap: 16px; flex-wrap: wrap; font-size: 11px; border-bottom: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 5px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .content { padding: 16px 20px; }
  .section { display: none; }
  .section.active { display: block; }
  .stats { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
  .stats span { color: var(--accent); font-weight: 600; }

  .speakers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .speaker-card { background: var(--card); border-radius: 12px; padding: 14px; border: 1px solid var(--border); border-left: 4px solid var(--border); transition: border-color 0.2s, transform 0.1s; position: relative; }
  .speaker-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .speaker-card.p-high { border-left-color: var(--red); }
  .speaker-card.p-med  { border-left-color: var(--yellow); }
  .speaker-card.p-low  { border-left-color: var(--green); }

  .new-badge { position: absolute; top: 10px; right: 46px; background: var(--accent); color: #000; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 8px; }

  .speaker-top { display: flex; gap: 12px; margin-bottom: 10px; }
  .speaker-initial { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .speaker-info { flex: 1; min-width: 0; }
  .name-jp { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .name-en { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .speaker-company { font-size: 12px; color: var(--accent); font-weight: 500; }
  .speaker-role { font-size: 11px; color: var(--muted); }
  .speaker-cat { display: inline-block; font-size: 10px; padding: 1px 7px; background: #2a2a2a; border-radius: 10px; color: #aaa; margin-top: 3px; }
  .speaker-desc { font-size: 12px; color: #ccc; line-height: 1.6; margin-bottom: 10px; }

  .pitch-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .ptag { padding: 3px 9px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .ptag-jpyr   { background: rgba(68,153,255,0.15); color: #7ab8ff; border: 1px solid rgba(68,153,255,0.3); }
  .ptag-izakaya { background: rgba(255,80,80,0.1); color: #ff8888; border: 1px solid rgba(255,80,80,0.25); }
  .ptag-sto    { background: rgba(68,187,68,0.1); color: #88dd88; border: 1px solid rgba(68,187,68,0.25); }
  .ptag-net    { background: rgba(120,120,120,0.1); color: #888; border: 1px solid rgba(120,120,120,0.2); }
  .ptag-media  { background: rgba(180,80,220,0.1); color: #cc88ff; border: 1px solid rgba(180,80,220,0.25); }

  .sponsor-tier-section { margin-bottom: 28px; }
  .tier-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .tier-name { font-size: 16px; font-weight: 700; }
  .tier-title { color: #FFD700; }
  .tier-diamond { color: #b9f2ff; }
  .tier-platinum { color: #C0C0C0; }
  .tier-gold { color: #CD7F32; }
  .tier-vc { color: var(--accent2); }
  .tier-count { font-size: 12px; color: var(--muted); }

  .sponsor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; }
  .sponsor-card { background: var(--card); border-radius: 10px; padding: 12px 14px; border: 1px solid var(--border); border-left: 4px solid var(--border); transition: border-color 0.2s; position: relative; }

  .sponsor-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .sponsor-name a { color: var(--text); text-decoration: none; }
  .sponsor-name a:hover { color: var(--accent); }
  .sponsor-cat { font-size: 11px; color: var(--accent); margin-bottom: 6px; }
  .sponsor-desc { font-size: 11px; color: #bbb; line-height: 1.55; }
  .sponsor-tags { margin-top: 8px; display: flex; gap: 5px; flex-wrap: wrap; }

  .social-row { display: flex; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #2a2a2a; flex-wrap: wrap; }
  .slink { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 9px; border-radius: 6px; text-decoration: none; transition: opacity 0.2s; white-space: nowrap; }
  .slink:hover { opacity: 0.75; }
  .slink-x { background: #000; color: #fff; border: 1px solid #444; }
  .slink-web { background: #1a1a2e; color: #88aaff; border: 1px solid #2a2a55; }

  .pri-picker { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; align-items: center; z-index: 2; }
  .pri-dot { width: 13px; height: 13px; border-radius: 50%; border: 2px solid #333; cursor: pointer; background: transparent; transition: all 0.15s; padding: 0; flex-shrink: 0; }
  .pri-dot:hover { transform: scale(1.3); }
  .pd-high { border-color: rgba(255,68,68,0.45); }
  .pd-high:hover, .pd-high.active { background: var(--red); border-color: var(--red); box-shadow: 0 0 6px rgba(255,68,68,0.55); }
  .pd-med  { border-color: rgba(255,170,0,0.45); }
  .pd-med:hover,  .pd-med.active  { background: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 6px rgba(255,170,0,0.55); }
  .pd-low  { border-color: rgba(68,187,68,0.45); }
  .pd-low:hover,  .pd-low.active  { background: var(--green); border-color: var(--green); box-shadow: 0 0 6px rgba(68,187,68,0.55); }
  .sponsor-card.up-high { border-left-color: var(--red) !important; }
  .sponsor-card.up-med  { border-left-color: var(--yellow) !important; }
  .sponsor-card.up-low  { border-left-color: var(--green) !important; }
  .hidden { display: none !important; }
</style>
</head>

let fbPriorities = {};

function renderSpeakers() {
  const grid = document.getElementById('speakers-grid');
  grid.innerHTML = '';
  speakers.forEach((s, i) => {
    const fbKey = 'speaker#' + s.en;
    const pri = fbPriorities[fbKey] || s.priority;
    const card = document.createElement('div');
    card.className = 'speaker-card p-' + pri;
    card.dataset.pitch = (s.pitch||[]).join(',');
    card.dataset.pri = pri;
    card.dataset.defaultPri = s.priority;
    card.dataset.fbkey = fbKey;
    card.dataset.idx = i;

    const init = (s.en||s.jp).charAt(0);
    const col = getColor(s.en||s.jp);
    let tags = (s.pitch||[]).map(p => {
      const labels = {jpyr:'💴 JPYR', sto:'📈 STO', izakaya:'🏮 IZAKAYA', net:'🤝 NET', media:'📺 MEDIA'};
      return '<span class="ptag ptag-'+p+'">'+(labels[p]||p)+'</span>';
    }).join('');

    card.innerHTML = `
      ${s.isNew ? '<div class="new-badge">NEW</div>' : ''}
      <div class="pri-picker">
        <button class="pri-dot pd-high ${pri==='high'?'active':''}" onclick="setPri('${fbKey}','high',this)"></button>
        <button class="pri-dot pd-med ${pri==='med'?'active':''}" onclick="setPri('${fbKey}','med',this)"></button>
        <button class="pri-dot pd-low ${pri==='low'?'active':''}" onclick="setPri('${fbKey}','low',this)"></button>
      </div>
      <div class="speaker-top">
        <div class="speaker-initial" style="background:${col}">${init}</div>
        <div class="speaker-info">
          <div class="name-jp">${s.jp}</div>
          <div class="name-en">${s.en}</div>
          <div class="speaker-company">${s.company}</div>
          <div class="speaker-role">${s.role}</div>
          <span class="speaker-cat">${s.cat}</span>
        </div>
      </div>
      <div class="speaker-desc">${s.desc}</div>
      <div class="pitch-tags">${tags}</div>
    `;
    grid.appendChild(card);
  });
  updateSpeakerStats();
}

function renderSponsors() {
  const container = document.getElementById('sponsors-content');
  container.innerHTML = '';
  const tierMeta = {
    title: {label:'🏆 Title Sponsor', cls:'tier-title'},
    diamond: {label:'💎 Diamond Sponsor', cls:'tier-diamond'},
    platinum: {label:'🥇 Platinum Sponsor', cls:'tier-platinum'},
    gold: {label:'🥉 Gold Sponsor', cls:'tier-gold'},
    vc: {label:'🚀 VC Partner', cls:'tier-vc'},
  };
  for (const [tier, list] of Object.entries(sponsors)) {
    if (!list.length) continue;
    const m = tierMeta[tier];
    const sec = document.createElement('div');
    sec.className = 'sponsor-tier-section';
    sec.innerHTML = `<div class="tier-header"><span class="tier-name ${m.cls}">${m.label}</span><span class="tier-count">${list.length}社</span></div>`;
    const grid = document.createElement('div');
    grid.className = 'sponsor-grid';
    list.forEach(s => {
      const fbKey = 'sponsor#' + s.name;
      const pri = fbPriorities[fbKey] || '';
      const card = document.createElement('div');
      card.className = 'sponsor-card' + (s.isNew ? ' s-new' : '') + (pri ? ' up-'+pri : '');
      card.dataset.pitch = (s.pitch||[]).join(',');
      card.dataset.pri = pri;
      card.dataset.fbkey = fbKey;
      card.dataset.isNew = s.isNew;
      let tags = (s.pitch||[]).map(p => {
        const labels = {jpyr:'💴 JPYR', sto:'📈 STO', izakaya:'🏮 IZAKAYA', net:'🤝 NET', media:'📺 MEDIA'};
        return '<span class="ptag ptag-'+p+'">'+(labels[p]||p)+'</span>';
      }).join('');
      card.innerHTML = `
        <div class="pri-picker">
          <button class="pri-dot pd-high ${pri==='high'?'active':''}" onclick="setPri('${fbKey}','high',this)"></button>
          <button class="pri-dot pd-med ${pri==='med'?'active':''}" onclick="setPri('${fbKey}','med',this)"></button>
          <button class="pri-dot pd-low ${pri==='low'?'active':''}" onclick="setPri('${fbKey}','low',this)"></button>
        </div>
        <div class="sponsor-name">${s.url && s.url !== '#' ? '<a href="'+s.url+'" target="_blank">'+s.name+'</a>' : s.name}</div>
        <div class="sponsor-cat">${s.cat}</div>
        <div class="sponsor-desc">${s.desc}</div>
        <div class="sponsor-tags">${tags}</div>
        ${s.url && s.url !== '#' ? '<div class="social-row"><a class="slink slink-web" href="'+s.url+'" target="_blank">🌐 Web</a></div>' : ''}
      `;
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    container.appendChild(sec);
  });
  updateSponsorStats();
}

// ============================================================
// TAB / FILTER
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  if (tab === 'speakers') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('section-speakers').classList.add('active');
    document.getElementById('speaker-filters').style.display = '';
    document.getElementById('sponsor-filters').style.display = 'none';
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('section-sponsors').classList.add('active');
    document.getElementById('speaker-filters').style.display = 'none';
    document.getElementById('sponsor-filters').style.display = '';
  }
}

function filterSpeakers(f, btn) {
  document.querySelectorAll('#speaker-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.speaker-card').forEach(c => {
    if (f === 'all') { c.classList.remove('hidden'); return; }
    if (['high','med','low'].includes(f)) { c.classList.toggle('hidden', c.dataset.pri !== f); return; }
    c.classList.toggle('hidden', !c.dataset.pitch.includes(f));
  });
  updateSpeakerStats();
}

function filterSponsors(f, btn) {
  document.querySelectorAll('#sponsor-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.sponsor-card').forEach(c => {
    if (f === 'all') { c.classList.remove('hidden'); return; }
    if (f === 'new') { c.classList.toggle('hidden', c.dataset.isNew !== 'true'); return; }
    if (['high','med','low'].includes(f)) { c.classList.toggle('hidden', c.dataset.pri !== f); return; }
    c.classList.toggle('hidden', !c.dataset.pitch.includes(f));
  });
  updateSponsorStats();
}

function updateSpeakerStats() {
  const all = document.querySelectorAll('.speaker-card');
  const vis = document.querySelectorAll('.speaker-card:not(.hidden)');
  document.getElementById('sp-stats').innerHTML = '表示中: <span>'+vis.length+'</span>件 / 全'+all.length+'件';
  document.getElementById('sp-count').textContent = '('+all.length+')';
}
function updateSponsorStats() {
  const all = document.querySelectorAll('.sponsor-card');
  const vis = document.querySelectorAll('.sponsor-card:not(.hidden)');
  document.getElementById('so-stats').innerHTML = '表示中: <span>'+vis.length+'</span>社';
  document.getElementById('so-count').textContent = '('+all.length+')';
}

// ============================================================
// PRIORITY (Firebase)
// ============================================================
function setPri(fbKey, level, btn) {
  const card = btn.closest('.speaker-card, .sponsor-card');
  const current = card.dataset.pri;
  const newPri = current === level ? '' : level;
  card.dataset.pri = newPri;
  card.className = card.className.replace(/p-(high|med|low)/g, '').replace(/up-(high|med|low)/g, '').trim();
  if (newPri) card.classList.add(card.classList.contains('sponsor-card') ? 'up-'+newPri : 'p-'+newPri);
  card.querySelectorAll('.pri-dot').forEach(d => d.classList.remove('active'));
  if (newPri) btn.classList.add('active');
  fbPriorities[fbKey] = newPri;
  if (typeof FBDB !== 'undefined' && PRI_REF) {
    PRI_REF.child(fbKey.replace(/[.#$/\[\]]/g,'_')).set(newPri || null);
  }
}

// ============================================================
// FIREBASE INIT
// ============================================================
let FBDB, PRI_REF;
try {
  const firebaseConfig = {
    authDomain: "FILL_IN.firebaseapp.com",
    databaseURL: "https://FILL_IN-default-rtdb.firebaseio.com"
  };
  firebase.initializeApp(firebaseConfig);
  FBDB = firebase.database();
  PRI_REF = FBDB.ref('teamz2026/priorities');
  FBDB.ref('.info/connected').on('value', snap => {
    const dot = document.getElementById('sync-dot');
    const label = document.getElementById('sync-label');
    if (snap.val()) { dot.style.background='#44bb44'; label.textContent='Synced'; label.style.color='#44bb44'; }
    else { dot.style.background='#555'; label.textContent='Syncing...'; label.style.color='#555'; }
  });
  PRI_REF.on('value', snap => {
    const data = snap.val() || {};
    for (const [k, v] of Object.entries(data)) fbPriorities[k] = v;
    renderSpeakers();
    renderSponsors();
  });
} catch(e) {
  document.getElementById('sync-label').textContent = 'Local mode';
  renderSpeakers();
  renderSponsors();
}

if (!PRI_REF) { renderSpeakers(); renderSponsors(); }
